global:
  resolve_timeout: 5m

route:
  receiver: 'github-webhook'
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  routes:
    - match:
        severity: critical
      receiver: 'github-webhook'
      group_wait: 5s
    - match:
        severity: warning
      receiver: 'github-webhook'

receivers:
  - name: 'github-webhook'
    webhook_configs:
      - url: 'https://api.github.com/repos/Hamza1080/mlops_assignment4/dispatches'
        send_resolved: false
        http_config:
          authorization:
            type: Bearer
            credentials: 'YOUR_PAT_TOKEN_HERE'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']

    