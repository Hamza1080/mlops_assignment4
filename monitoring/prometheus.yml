global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'fraud-detection'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'alert_rules.yaml'

scrape_configs:
  # ============================================================================
  # Prometheus Server Self-Monitoring
  # ============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: '/metrics'

  # ============================================================================
  # Fraud Detection Inference API (FastAPI)
  # ============================================================================
  - job_name: 'fraud-api'
    static_configs:
      - targets: ['fraud-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__scheme__]
        target_label: scheme
    metric_relabel_configs:
      # Keep only fraud detection model metrics
      - source_labels: [__name__]
        regex: 'fraud_.*|http_requests.*|model_.*'
        action: keep

  # ============================================================================
  # Kubeflow Pipeline Components
  # ============================================================================
  - job_name: 'kubeflow-pipeline'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - fraud-detection
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: 'fraud-.*'
        action: keep
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod_name
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_label_component]
        target_label: component

  # ============================================================================
  # Kubernetes Cluster Metrics
  # ============================================================================
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace

  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - source_labels: [__address__]
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}:9100'
        target_label: __address__

  # ============================================================================
  # PostgreSQL Database Metrics (Model registry backend)
  # ============================================================================
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'pg_.*|process_.*'
        action: keep

  # ============================================================================
  # Custom Application Metrics from External Scrapers
  # ============================================================================
  - job_name: 'pushgateway'
    static_configs:
      - targets: ['pushgateway:9091']

remote_write:
  # Optional: Send metrics to long-term storage (e.g., Thanos, Cortex)
  # - url: http://thanos-receiver:19291/api/v1/receive
