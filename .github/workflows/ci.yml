name: MLOps CI/CD Pipeline - Fraud Detection

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - 'kubeflow/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/ci.yml'
  
  pull_request:
    branches:
      - main
  
  # Webhook trigger from monitoring system (drift alert)
  repository_dispatch:
    types:
      - model-drift-alert
      - performance-degradation-alert

env:
  IMAGE_NAME_TRAIN: hamza1080/mlops_assignment4/fraud-train
  IMAGE_NAME_API: hamza1080/mlops_assignment4/fraud-api
  KUBEFLOW_NAMESPACE: fraud-detection

jobs:
  # ============================================================================
  # Stage 1: Continuous Integration (Code Quality + Unit Tests)
  # ============================================================================
  
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov black mypy
      
      - name: Lint with flake8
        run: |
          # Stop build on syntax errors
          flake8 src/ kubeflow/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues
          flake8 src/ kubeflow/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
      
      - name: Code formatting check (black)
        run: |
          black --check src/ kubeflow/ tests/ || true  # Warn only
      
      - name: Type checking (mypy)
        run: |
          mypy src/ --ignore-missing-imports --warn-unused-ignores || true
      
      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-report=xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
      
      
      - name: Save test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            htmlcov/
            coverage.xml
  
  # ============================================================================
  # Stage 2: Build & Package (Docker Image Creation)
  # ============================================================================
  
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'repository_dispatch'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # Build training image
      - name: Build training image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile.train
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_TRAIN }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_TRAIN }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # Build API image
      - name: Build API image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile.api
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Image scan for vulnerabilities
        run: |
          docker run --rm aquasec/trivy image \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_TRAIN }}:${{ github.sha }} || true
  
  # ============================================================================
  # Stage 3: Continuous Deployment (Kubeflow Pipeline Trigger)
  # ============================================================================
  
  deploy:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'repository_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: '1.27'
      
      - name: Configure Kubernetes access
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info
      
      - name: Create namespace and prerequisites
        run: |
          kubectl apply -f kubeflow/namespace.yaml
          kubectl apply -f kubeflow/resource_quota.yaml
          kubectl apply -f kubeflow/pvc.yaml
      
      - name: Compile Kubeflow pipeline
        run: |
          python -m pip install kfp==2.3.0 google-cloud-aiplatform
          python kubeflow/compile_pipeline.py
      
      - name: Deploy Kubeflow pipeline
        run: |
          kubectl apply -f kubeflow/deployment.yaml
          echo "Waiting for pipeline deployment..."
          kubectl wait --for=condition=Ready pod \
            -l app=fraud-detection-pipeline \
            -n ${{ env.KUBEFLOW_NAMESPACE }} \
            --timeout=300s || true
      
      - name: Verify pipeline status
        run: |
          kubectl get pods -n ${{ env.KUBEFLOW_NAMESPACE }}
          kubectl describe workflow -n ${{ env.KUBEFLOW_NAMESPACE }} || true
      
      - name: Fetch pipeline logs
        if: always()
        run: |
          kubectl logs -n ${{ env.KUBEFLOW_NAMESPACE }} -l app=fraud-detection-pipeline --tail=100 || true
      
      - name: Notify deployment status
        uses: 8398a7/action-slack@v4
        if: always()
        with:
          status: ${{ job.status }}
          text: |
            Deployment ${{ job.status }}: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
  
  # ============================================================================
  # Stage 4: Intelligent Trigger (Drift-Based Retraining)
  # ============================================================================
  
  intelligent-trigger:
    name: Intelligent Retraining Trigger
    runs-on: ubuntu-latest
    if: github.event_name == 'repository_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Parse drift alert details
        run: |
          echo "Drift Alert Triggered"
          echo "Alert Type: ${{ github.event.action }}"
          echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
      
      - name: Set up Python for drift analysis
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Analyze drift severity
        run: |
          python scripts/analyze_drift.py \
            --alert-type "${{ github.event.action }}" \
            --output drift_report.json
      
      - name: Determine retraining strategy
        id: strategy
        run: |
          python scripts/determine_strategy.py \
            --drift-report drift_report.json \
            --output strategy.json
          STRATEGY=$(cat strategy.json | jq -r '.action')
          echo "strategy=$STRATEGY" >> $GITHUB_OUTPUT
      
      - name: Execute retraining if needed
        if: steps.strategy.outputs.strategy == 'retrain'
        run: |
          echo "High drift detected. Triggering retraining pipeline..."
          # Compile and deploy new pipeline with latest data
          python kubeflow/compile_pipeline.py
          kubectl apply -f kubeflow/deployment.yaml
      
      - name: Send notification to monitoring system
        run: |
          curl -X POST http://alertmanager:9093/api/v1/alerts \
            -H "Content-Type: application/json" \
            -d '{
              "alerts": [{
                "labels": {
                  "alertname": "ModelRetrainingTriggered",
                  "severity": "info"
                },
                "annotations": {
                  "summary": "Drift-triggered retraining pipeline initiated"
                }
              }]
            }' || true
      
      - name: Log drift event
        run: |
          cat > drift_event.log << EOF
          Event: Drift Alert
          Type: ${{ github.event.action }}
          Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          Strategy: ${{ steps.strategy.outputs.strategy }}
          Triggered By: ${{ github.actor }}
          EOF
          
          # Store in artifact store for audit trail
          mkdir -p audit_trail
          cp drift_event.log audit_trail/drift_$(date +%s).log
      
      - name: Upload audit trail
        uses: actions/upload-artifact@v4
        with:
          name: drift-audit-trail
          path: audit_trail/
      
      - name: Cleanup
        if: always()
        run: |
          rm -f drift_report.json strategy.json drift_event.log
